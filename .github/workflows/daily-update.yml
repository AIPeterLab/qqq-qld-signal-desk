name: Daily signal update

on:
  schedule:
    - cron: "15 18 * * *"
      timezone: "America/New_York"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
      EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update signal files
        run: python scripts/update_signals.py

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily QQQ/QLD signals"
          file_pattern: data/signals.json data/signals.csv

      - name: Email refresh confirmation
        if: ${{ env.EMAIL_USERNAME != '' && env.EMAIL_APP_PASSWORD != '' }}
        run: python scripts/send_refresh_email.py
